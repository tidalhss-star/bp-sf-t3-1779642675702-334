  <style>
    /* ===== RESET & BASE ===== */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { font-size: 100%; scroll-behavior: smooth; }
    body {
      background: #000;
      color: #fff;
      font-family: Impact, system-ui, sans-serif;
      line-height: 1.2;
      min-height: 100vh;
      padding: 0;
      margin: 0;
      text-rendering: optimizeLegibility;
    }
    a { color: inherit; text-decoration: none; }
    a:hover, a:focus { opacity: 0.8; }
    ul, ol { list-style: none; }

    /* ===== SPACE – airy ===== */
    :root {
      --gap: 48px;
      --padding: 72px;
      --section-gap: 120px;
      --border-thick: 4px;
      --accent: #ff3b00;
    }

    .container {
      max-width: 1400px;
      margin: 0 auto;
      padding: 0 var(--padding);
    }

    section {
      padding: var(--padding) 0;
      margin-bottom: var(--section-gap);
    }
    section:last-of-type { margin-bottom: 0; }

    /* ===== TYPOGRAPHY ===== */
    h1, h2, h3, h4, h5, h6 {
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: -0.01em;
    }
    h1 { font-size: clamp(4rem, 10vw, 7rem); }
    h2 { font-size: clamp(3rem, 7vw, 5rem); }
    h3 { font-size: 2.2rem; }
    p, li, blockquote { font-family: system-ui, sans-serif; font-weight: 400; }

    /* ===== BRUTALIST BASE ===== */
    .brutal-border {
      border: var(--border-thick) solid var(--accent);
      padding: 24px;
      background: #000;
      box-shadow: 8px 8px 0 0 var(--accent);
    }

    .btn {
      display: inline-block;
      padding: 18px 48px;
      background: var(--accent);
      color: #fff;
      font-family: Impact, system-ui, sans-serif;
      font-size: 1.5rem;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      border: 3px solid #fff;
      cursor: pointer;
      transition: all 0.1s ease;
    }
    .btn:hover {
      background: #fff;
      color: #000;
      border-color: var(--accent);
      transform: rotate(-1deg) scale(1.02);
    }

    /* ===== HEADER & NAV ===== */
    header {
      position: sticky;
      top: 0;
      z-index: 100;
      background: #000;
      border-bottom: var(--border-thick) solid var(--accent);
      padding: 24px var(--padding);
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .logo {
      font-size: 2.8rem;
      letter-spacing: -0.04em;
      transform: rotate(-2deg) skew(-2deg);
      display: inline-block;
      border: 3px solid #fff;
      padding: 8px 24px;
    }
    .logo span { color: var(--accent); }

    /* 체크박스 햄버거 내비게이션 (순수 CSS) */
    .nav-toggle { display: none; }

    .nav-label {
      display: none;
      font-size: 3rem;
      cursor: pointer;
      color: #fff;
      padding: 8px;
      border: 3px solid var(--accent);
      line-height: 1;
    }

    .nav-list {
      display: flex;
      gap: var(--gap);
      align-items: center;
    }
    .nav-list li a {
      font-size: 1.4rem;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      padding: 8px 12px;
      border: 2px solid transparent;
      transition: 0.1s;
    }
    .nav-list li a:hover {
      border-color: var(--accent);
      transform: rotate(-1deg);
    }

    /* ===== HERO ===== */
    .hero {
      background: repeating-linear-gradient(45deg, #000 0px, #000 20px, #111 20px, #111 40px);
      padding: var(--padding) 0;
      min-height: 80vh;
      display: flex;
      align-items: center;
      position: relative;
      overflow: hidden;
    }

    .hero::after {
      content: '';
      position: absolute;
      top: 0; left: 0; width: 100%; height: 100%;
      background: radial-gradient(circle at 20% 30%, var(--accent) 0%, transparent 50%);
      mix-blend-mode: screen;
      opacity: 0.3;
      pointer-events: none;
    }

    .hero-content {
      position: relative;
      z-index: 2;
      max-width: 1000px;
    }

    .hero h1 {
      font-size: clamp(4rem, 12vw, 8rem);
      line-height: 0.9;
      transform: rotate(-4deg) skew(-5deg);
      margin-bottom: 24px;
      text-shadow: 8px 8px 0 var(--accent);
    }

    .hero h1 .outline {
      color: #000;
      -webkit-text-stroke: 3px #fff;
      text-stroke: 3px #fff;
    }

    .hero p {
      font-size: 1.8rem;
      font-family: system-ui, sans-serif;
      font-weight: 700;
      text-transform: uppercase;
      margin-bottom: 48px;
      border-left: 6px solid var(--accent);
      padding-left: 24px;
      transform: rotate(1deg);
    }

    .hero .btn-group {
      display: flex;
      gap: 24px;
      flex-wrap: wrap;
    }

    /* ===== SECTION – 비대칭 블록 ===== */
    .asymmetric-grid {
      display: grid;
      grid-template-columns: 1fr 1.3fr;
      gap: var(--gap);
      align-items: start;
    }
    .asymmetric-grid .block {
      padding: 48px;
      border: var(--border-thick) solid var(--accent);
      background: #000;
    }
    .asymmetric-grid .block:nth-child(1) {
      transform: rotate(-2deg) translateY(-20px);
    }
    .asymmetric-grid .block:nth-child(2) {
      transform: rotate(1deg) translateY(40px);
      background: #111;
    }
    .asymmetric-grid .block h3 {
      font-size: 2.5rem;
      margin-bottom: 16px;
      color: var(--accent);
    }
    .asymmetric-grid .block p {
      font-size: 1.2rem;
      line-height: 1.5;
      opacity: 0.9;
    }

    /* ===== REVIEW CARDS ===== */
    .review-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: var(--gap);
      margin-top: 60px;
    }

    .review-card {
      border: var(--border-thick) solid #fff;
      padding: 32px;
      background: #000;
      position: relative;
      transition: 0.1s;
    }
    .review-card:hover {
      border-color: var(--accent);
      transform: scale(1.02) rotate(-0.5deg);
    }
    .review-card:nth-child(odd) { transform: rotate(1deg); }
    .review-card:nth-child(even) { transform: rotate(-1.5deg); }

    .review-stars {
      color: var(--accent);
      font-size: 1.8rem;
      letter-spacing: 4px;
      margin-bottom: 12px;
    }
    .review-text {
      font-size: 1.1rem;
      font-family: system-ui, sans-serif;
      line-height: 1.6;
      margin-bottom: 20px;
      font-style: italic;
    }
    .review-author {
      display: flex;
      justify-content: space-between;
      font-size: 0.9rem;
      text-transform: uppercase;
      opacity: 0.7;
      border-top: 2px solid var(--accent);
      padding-top: 16px;
    }

    /* ===== FOOTER ===== */
    footer {
      border-top: var(--border-thick) solid var(--accent);
      padding: 48px var(--padding);
      display: flex;
      flex-wrap: wrap;
      justify-content: space-between;
      align-items: center;
      gap: 32px;
      background: #000;
    }
    footer .phone {
      font-size: 2rem;
      font-family: 'Courier New', monospace;
      border: 3px solid #fff;
      padding: 12px 32px;
      transition: 0.1s;
    }
    footer .phone:hover {
      border-color: var(--accent);
      background: var(--accent);
      color: #000;
      transform: rotate(-2deg);
    }
    footer .copyright {
      font-family: system-ui, sans-serif;
      opacity: 0.6;
      font-size: 0.9rem;
    }

    /* ===== RESPONSIVE ===== */
    @media (max-width: 768px) {
      :root {
        --padding: 36px;
        --gap: 32px;
        --section-gap: 80px;
      }

      header {
        padding: 16px var(--padding);
      }

      .logo {
        font-size: 2rem;
      }

      .nav-label {
        display: block;
      }

      .nav-list {
        display: none;
        position: absolute;
        top: 100%;
        left: 0;
        width: 100%;
        background: #000;
        border-bottom: 4px solid var(--accent);
        flex-direction: column;
        gap: 0;
        padding: 24px;
      }
      .nav-list li { width: 100%; }
      .nav-list li a { display: block; padding: 16px; border: none; border-bottom: 1px solid #222; }

      .nav-toggle:checked ~ .nav-list {
        display: flex;
      }

      .hero {
        min-height: 60vh;
        padding: var(--padding) 0;
      }
      .hero h1 {
        font-size: clamp(3rem, 12vw, 5rem);
        transform: rotate(-2deg) skew(-3deg);
      }
      .hero p {
        font-size: 1.2rem;
      }

      .asymmetric-grid {
        grid-template-columns: 1fr;
      }
      .asymmetric-grid .block:nth-child(1),
      .asymmetric-grid .block:nth-child(2) {
        transform: none;
      }

      .review-grid {
        grid-template-columns: 1fr;
      }
      .review-card:nth-child(odd),
      .review-card:nth-child(even) {
        transform: none !important;
      }

      footer {
        flex-direction: column;
        align-items: flex-start;
      }
      footer .phone {
        font-size: 1.5rem;
        width: 100%;
        text-align: center;
      }
    }

    /* ===== RAW TEXTURE ===== */
    .texture-dots {
      background-image: radial-gradient(circle, #222 1px, transparent 1px);
      background-size: 12px 12px;
    }

    /* ===== EMOJI 대체 ===== */
    .icon-emoji {
      font-size: 3rem;
      display: inline-block;
      filter: grayscale(1) contrast(2);
    }
  </style>
</head>
